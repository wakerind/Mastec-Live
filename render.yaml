services:
  - type: web
    name: mastec-live-portal
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: mastec-live-db
          property: connectionString

databases:
  - name: mastec-live-db
    plan: free
    region: oregon
    databaseName: masteclive
    user: masteclive
    postgresMajorVersion: "18"
